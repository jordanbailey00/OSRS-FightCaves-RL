[base]
package = ocean
env_name = puffer_moba
policy_name = MOBA
rnn_name = Recurrent

[env]
vision_range = 5
agent_speed = 1.0
discretize = 1
script_opponents = 1
reward_death = 0.0
reward_xp = 0.0016926873475313188
reward_distance = 0.0
reward_tower = 4.525112152099609

[vec]
total_agents = 2560

[train]
total_timesteps = 150_000_000

[sweep]
downsample = 10
max_cost = 500

[sweep.train.total_timesteps]
distribution = log_normal
min = 2e7
max = 5e8
mean = 1e8
scale = auto

[sweep.policy.hidden_size]
distribution = uniform_pow2
min = 16
max = 1024
mean = 128
scale = auto

[sweep.env.num_envs]
distribution = uniform_pow2
min = 1
max = 4096
mean = 2048
scale = auto

[sweep.env.reward_death]
distribution = uniform
min = -1.0
max = 0
mean = 0
scale = auto

[sweep.env.reward_xp]
distribution = uniform
min = 0.0
max = 0.05
mean = 0.0015
scale = auto

[sweep.env.reward_tower]
distribution = uniform
min = 0.0
max = 1.0
mean = 1.0
scale = auto
