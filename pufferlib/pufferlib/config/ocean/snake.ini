[base]
package = ocean
env_name = puffer_snake
policy_name = Snake
rnn_name = Recurrent

[env]
width = 640
height = 360
num_agents = 256
num_food = 4096
vision = 5
leave_corpse_on_death = True
reward_food = 0.1
reward_corpse = 0.1
reward_death = -1.0
max_snake_length = 1024
cell_size = 2

[vec]
total_agents = 4096

[train]
total_timesteps = 500_000_000
gamma = 0.99
minibatch_size = 32768

[sweep]
max_cost = 500

[sweep.env.reward_food]
distribution = uniform
min = 0.0
max = 1.0
mean = 0.0
scale = auto

[sweep.env.reward_death]
distribution = uniform
min = -1.0
max = 0.0
mean = 0.0
scale = auto

[sweep.train.total_timesteps]
distribution = log_normal
min = 2e7
max = 5e8
mean = 1e8
scale = auto

[sweep.policy.hidden_size]
distribution = uniform_pow2
min = 16
max = 1024
mean = 128
scale = auto

[sweep.env.num_envs]
distribution = uniform_pow2
min = 1
max = 32
mean = 8
scale = auto
