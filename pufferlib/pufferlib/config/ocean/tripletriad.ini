[base]
package = ocean
env_name = puffer_tripletriad
policy_name = Policy
rnn_name = Recurrent

[env]
width = 990
height = 690
card_width = 192
card_height = 224

[train]
total_timesteps = 20_000_000
gamma = 0.95

[sweep.train.total_timesteps]
distribution = log_normal
min = 1e7
max = 2e8
mean = 1e8
scale = time
