name: Build Runpod Image

on:
  workflow_dispatch:
  push:
    branches:
      - v2codex_v24.s
    paths:
      - .github/workflows/build-runpod-image.yml
      - deploy/runpod/**

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/runescape-rl-fight-caves-runpod
          tags: |
            type=raw,value=v24s
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/runpod
          file: ./deploy/runpod/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
