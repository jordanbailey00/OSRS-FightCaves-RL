[base]
env_name = drive

[vec]
total_agents = 4096
num_buffers = 8

[policy]
input_size = 64
hidden_size = 256

[env]
width = 1280
height = 1024
human_agent_idx = 0
reward_vehicle_collision = -1.0
reward_offroad_collision = -1.0
reward_goal_post_respawn = 0.25
reward_vehicle_collision_post_respawn = -0.5
resample_frequency = 10000
num_maps = 500

[train]
total_timesteps = 500_000_000
anneal_lr = True
batch_size = auto
minibatch_size = 32768
num_minibatches = 16
horizon = 64
adam_beta1 = 0.9
adam_beta2 = 0.999
adam_eps = 1e-8
clip_coef = 0.2
ent_coef = 0.001
gae_lambda = 0.95
gamma = 0.98
learning_rate = 0.001
max_grad_norm = 1
prio_alpha = 0.8499999999999999
prio_beta0 = 0.8499999999999999
update_epochs = 1
vf_clip_coef = 0.1999999999999999
vf_coef = 2
vtrace_c_clip = 1
vtrace_rho_clip = 1
checkpoint_interval = 1000



