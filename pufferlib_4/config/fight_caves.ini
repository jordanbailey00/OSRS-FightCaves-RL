[base]
env_name = fight_caves
checkpoint_interval = 50
# v18.3 corrected continuation sweep:
#   fixes the v18.2 sweep_only parser bug
#   removes curriculum contamination from evaluation
#   uses a gentler continuation recipe around a stronger v18.1 checkpoint
#   sweep only LR / clip / entropy
# Launch with:
#   bash sweep_v18_3.sh

[env]
# v18.3 corrected continuation sweep on the current codex3 codebase.
# Curriculum is disabled again so the continuation is directly comparable
# to the scratch baselines and the sweep metric is not inflated by
# curriculum starts.
w_damage_dealt = 1.0
w_damage_taken = -0.75
w_npc_kill = 2.0
w_wave_clear = 10.0
w_jad_damage = 2.0
w_jad_kill = 50.0
w_player_death = -20.0
w_cave_complete = 100.0
w_food_used = -0.5
w_food_used_well = 1.0
w_prayer_pot_used = -1.0
w_correct_jad_prayer = 0.0
w_wrong_jad_prayer = 0.0
w_correct_danger_prayer = 1.0
w_wrong_danger_prayer = 0.0
w_invalid_action = -0.1
w_movement = 0.0
w_idle = 0.0
w_tick_penalty = -0.001
shape_food_full_waste_penalty = -5.0
shape_food_waste_scale = -1.0
shape_food_safe_hp_threshold = 1.0
shape_food_no_threat_penalty = 0.0
shape_pot_full_waste_penalty = -5.0
shape_pot_waste_scale = -1.0
shape_pot_safe_prayer_threshold = 1.0
shape_pot_no_threat_penalty = 0.0
shape_wrong_prayer_penalty = -1.0
shape_npc_specific_prayer_bonus = 2.0
shape_npc_melee_penalty = -0.5
shape_wasted_attack_penalty = -0.3
shape_wave_stall_start = 500
shape_wave_stall_base_penalty = -0.75
shape_wave_stall_ramp_interval = 50
shape_wave_stall_cap = -3.0
shape_not_attacking_grace_ticks = 2
shape_not_attacking_penalty = -0.5
shape_kiting_reward = 1.0
shape_kiting_min_dist = 5
shape_kiting_max_dist = 7
shape_unnecessary_prayer_penalty = -0.2
shape_resource_threat_window = 2
curriculum_wave = 0
curriculum_pct = 0.0
curriculum_wave_2 = 0
curriculum_pct_2 = 0.0
curriculum_wave_3 = 0
curriculum_pct_3 = 0.0
disable_movement = 0

[vec]
total_agents = 4096
num_buffers = 1

[train]
# v18.3 default seed trial values. Sweep varies a narrow band around them.
total_timesteps = 400_000_000
learning_rate = 0.0002
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.10
vf_coef = 0.5
ent_coef = 0.005
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096

[policy]
hidden_size = 256
num_layers = 2

[sweep]
method = Protein
metric = wave_reached
metric_distribution = linear
goal = maximize
max_suggestion_cost = 1200
max_runs = 16
gpus = 1
downsample = 5
use_gpu = True
prune_pareto = True
early_stop_quantile = 0.25
sweep_only = train/learning_rate, train/clip_coef, train/ent_coef

[sweep.train.learning_rate]
distribution = log_normal
min = 0.0001
max = 0.0003
scale = auto

[sweep.train.clip_coef]
distribution = uniform
min = 0.08
max = 0.12
scale = auto

[sweep.train.ent_coef]
distribution = log_normal
min = 0.003
max = 0.008
scale = auto
