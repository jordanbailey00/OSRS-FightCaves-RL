[base]
env_name = pong

[vec]
total_agents = 1024
num_buffers = 1
num_threads = 16

[env]
width = 500
height = 640
paddle_width = 20
paddle_height = 70
ball_width = 32
ball_height = 32
paddle_speed = 8
ball_initial_speed_x = 10
ball_initial_speed_y = 1
ball_speed_y_increment = 3
ball_max_speed_y = 13
max_score = 21
frameskip = 8
continuous = 0

[policy]
hidden_size = 32
num_layers = 1
expansion_factor = 1

[train]
gpus = 1
seed = 42
total_timesteps = 5000000
learning_rate = 0.1
anneal_lr = 1
min_lr_ratio = 0
gamma = 0.934713
gae_lambda = 0.991989
replay_ratio = 3.05148
clip_coef = 0.822764
vf_coef = 5
vf_clip_coef = 4.95789
max_grad_norm = 0.752747
ent_coef = 0.000402915
beta1 = 0.5
beta2 = 0.947709
eps = 0.0001
minibatch_size = 32768
horizon = 32
vtrace_rho_clip = 4.87841
vtrace_c_clip = 1.48608
prio_alpha = 0.242089
prio_beta0 = 0.807575
use_rnn = 1

[sweep.train.total_timesteps]
distribution = log_normal
min = 5e6
max = 5e7
scale = auto

[sweep.env.frameskip]
distribution = int_uniform
min = 1
max = 8
scale = 2.0
