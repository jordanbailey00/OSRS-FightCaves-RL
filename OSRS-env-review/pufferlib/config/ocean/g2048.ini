[base]
package = ocean
env_name = puffer_g2048
policy_name = G2048LSTM
rnn_name = Recurrent

[vec]
total_agents = 16384
num_buffers = 2
num_threads = 0
seed = 73

[env]
scaffolding_ratio = 0.519806

[policy]
hidden_size = 512
num_layers = 5.234647
expansion_factor = 1

[train]
gpus = 1
seed = 42
total_timesteps = 1447617152
learning_rate = 0.002626
anneal_lr = 1
min_lr_ratio = 0
gamma = 0.997792
gae_lambda = 0.486772
replay_ratio = 2.425443
clip_coef = 0.044709
vf_coef = 0.100000
vf_clip_coef = 0.010000
max_grad_norm = 1.011961
ent_coef = 0.010651
beta1 = 0.986052
beta2 = 0.997690
eps = 0.000001
minibatch_size = 32768
horizon = 64
vtrace_rho_clip = 1.181096
vtrace_c_clip = 2.886078
prio_alpha = 0.955458
prio_beta0 = 0.976691
env = 0
use_rnn = 0

[sweep]
max_suggestion_cost = 7200
#sweep_only = endgame_env_prob, scaffolding_ratio, snake_reward_weight, learning_rate, max_grad_norm

[sweep.env.scaffolding_ratio]
distribution = uniform
min = 0.1
mean = 0.5
max = 0.8
scale = auto

[sweep.train.learning_rate]
distribution = uniform
min = 0.0001
mean = 0.0005
max = 0.0030
scale = 0.5

[sweep.train.max_grad_norm]
distribution = uniform
min = 0.1
mean = 0.5
max = 2.0
scale = 0.5

