[base]
env_name = fight_caves
checkpoint_interval = 50
# v28: course-correction from v27.x series. Four major changes:
#   1. Telegraph obs (implemented for v27 but first used in v28): one-hot
#      attack-style bits (melee/ranged/magic) + separate LOS bit per NPC,
#      fire distance-based 2 ticks before attack landing. Lets the policy see
#      imminent threat style before committing to prayer.
#   2. Logit-level action mask: enforced in Policy forward() via
#      `logits + (mask - 1) * 1e9`. Previous masks-as-obs approach didn't
#      prevent masked actions in ~1-2% of steps; this makes them impossible.
#   3. w_wave_clear dialed back 50 → 15 (matches v26). In v27.3 wave_clear
#      averaged ~40× damage_dealt's contribution, crowding out fine-grained
#      signals. v26's 7× ratio gave better prayer/food behavior.
#   4. Restored dual-signal prayer structure from v26 —
#      shape_unnecessary_prayer_penalty = -0.2 re-added. v27.x collapsed to a
#      single correct_danger_prayer reward, which eliminated the pressure
#      against leaving prayer on when no threat. v26 had 78 prayer switches
#      per ep; v27.x had 1852-2293. v28 restores the switching behavior.
# Also: w_jad_kill down 3000 → 2000, w_correct_jad_prayer held at 1.5,
# w_correct_danger_prayer bumped 0.15 → 0.25 (user-stated target, above v26's
# 0.05 — higher break-even buffer against wrong_prayer_penalty = -0.3).
# Removed dead hparams: shape_wave_stall_* (4), shape_not_attacking_* (2).
# See docs/run_history.md v28 entry for full rationale.

[env]
# v28 base config (cold start, 3.5B steps)
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_full_waste_penalty = -6.5
shape_food_waste_scale = -1.2
shape_pot_full_waste_penalty = -6.5
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_resource_threat_window = 2

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_500_000_000
learning_rate = 0.0003
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
ent_coef = 0.01
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096

[policy]
hidden_size = 256
num_layers = 2

[sweep]
# Minimal sweep metadata so pufferl.py's target_key lookup succeeds
# and wandb logging fires. v28 is a single-config train run, not a sweep.
metric = jad_kill_rate
