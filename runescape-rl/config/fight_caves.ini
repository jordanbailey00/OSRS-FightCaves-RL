[base]
env_name = fight_caves
checkpoint_interval = 50
# v28.10: v28.4/v28.8/v28.9 reward config + training budget 2.5B → 2.75B (+10%).
# Single-variable change from v28.9. Probes the midpoint between
# v28.8 (3.0B, deployment SOTA) and v28.9 (2.5B, peak SOTA) to find
# the peak-vs-stability sweet spot in the β-compression curve.
#
# Context — v28 budget sweep so far (v28.4 reward config, only
# total_timesteps varies):
#   - v28.4 (3.5B):  peak jad_kill=0.386 @ 3.26B, stability=0.55
#   - v28.8 (3.0B):  peak jad_kill=0.591 @ 1.80B, stability=0.29  ← deployment SOTA
#   - v28.9 (2.5B):  peak jad_kill=0.635 @ 1.63B, stability=0.19  ← peak SOTA
# Peak monotonically climbed (+65% from 3.5B→2.5B) but stability
# monotonically degraded. v28.10 sits between v28.8 and v28.9.
#
# β schedule at 2.75B budget: at step 1.5B (projected peak window),
# β≈0.56 (v28.8 had 0.52, v28.9 had 0.608). Should reach effective
# range in the same 1.5–1.8B window as v28.9 but trail off more
# slowly, leaving more post-peak training at near-optimal β.
#
# Projection: peak jad 0.58–0.64 @ 1.6–1.8B, best-250M 0.29–0.34,
# final jad 0.20–0.30, stability 0.22–0.35. If peak ≥ 0.60 AND
# stability ≥ 0.30 → Pareto win, 2.75B is the sweet spot. If peak
# flat at ~0.60 and stability ~0.20 → monotonic tradeoff confirmed,
# no sweet spot in this region.

[env]
# v28.4 reward config — unchanged for v28.10. Only training budget differs.
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_waste_scale = -1.2
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_wave_stall_start = 1400
shape_wave_stall_ramp_interval = 150
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_cap = -2.0
shape_resource_threat_window = 2

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 2_750_000_000
learning_rate = 0.0003
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
ent_coef = 0.01
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096

[policy]
hidden_size = 256
num_layers = 2

[sweep]
# Minimal sweep metadata so pufferl.py's target_key lookup succeeds
# and wandb logging fires. v28 is a single-config train run, not a sweep.
metric = jad_kill_rate
