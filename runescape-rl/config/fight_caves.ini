[base]
env_name = fight_caves
checkpoint_interval = 50
# v28.4: v28 (with telegraph obs + logit-level mask + wave_clear=15 +
# unnecessary_prayer penalty restored) + re-added shape_wave_stall_*
# reward shaping to counter v28's late-training safespot/prayer-spam
# attractor. Wave_stall penalty fires every tick past the threshold
# while the wave still has NPCs, ramps linearly, clamps at cap, and
# resets on wave_clear.
#
# Best training config to date. Compared to v28 (peak jad_kill=0.597
# @ 2.79B but drifted to 0.148 by 3.5B due to safespot-forever
# exploit), v28.4 achieves:
#   - peak jad_kill=0.386 @ 3.26B (honest, not exploit-driven)
#   - best 250M window=0.240 (highest sustained performance)
#   - stability=0.55 (best of v28 series; peak still rising at 3.5B)
#   - conditional kill rate last-10%=32.1% (vs v28.1/2's 11-14%)
#   - max_wave_ticks=369 (vs v28's 7,894; safespot attractor eliminated)
#   - episode_length=7,987 (vs v28's 17,192; no more stall-lock)
#
# wave_stall threshold of 1400 ticks sits just past typical Jad-fight
# duration (v28.4's Jad deaths average ~1555 ticks). Lower thresholds
# (1000, 1200) over-correct — agent learns to avoid threshold entirely,
# loses access to legitimate Jad fights. Higher thresholds (1600) are
# too soft — agent extends failing Jad fights without proportional
# kill improvement. See docs/run_history.md v28.4 entry for full
# analysis and comparisons across v28.x series.

[env]
# v28.4 base config (cold start, 3.5B steps) — v28 + wave_stall shaping
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_full_waste_penalty = -6.5
shape_food_waste_scale = -1.2
shape_pot_full_waste_penalty = -6.5
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_wave_stall_start = 1400
shape_wave_stall_ramp_interval = 150
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_cap = -2.0
shape_resource_threat_window = 2

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_500_000_000
learning_rate = 0.0003
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
ent_coef = 0.01
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096

[policy]
hidden_size = 256
num_layers = 2

[sweep]
# Minimal sweep metadata so pufferl.py's target_key lookup succeeds
# and wandb logging fires. v28 is a single-config train run, not a sweep.
metric = jad_kill_rate
