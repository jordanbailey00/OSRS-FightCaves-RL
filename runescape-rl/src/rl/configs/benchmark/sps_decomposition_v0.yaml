# SPS Decomposition Benchmark Config (forensic investigation PR 2.1)
#
# Runs modes 1-4 in a single embedded-JVM pass:
#   Mode 1 — core simulation only (JVM tick)
#   Mode 2 — simulation + reward/done (tick + projection)
#   Mode 3 — simulation + observation (tick + observe_flat)
#   Mode 4 — full public env step (wall clock)
#
# Usage:
#   cd runescape-rl/src/rl
#   python scripts/benchmark_sps_decomposition.py \
#       --config configs/benchmark/sps_decomposition_v0.yaml \
#       --output results/sps_decomposition.json

config_id: sps_decomposition_v0

# Environment count — matches fast_env_v2 default for comparability
env_count: 64

# Measurement rounds (post-warmup)
rounds: 256

# Warmup rounds discarded before measurement
warmup_rounds: 16

# Fight Caves scenario parameters (match fast_env_v2)
start_wave: 1
ammo: 1000
prayer_potions: 8
sharks: 20
tick_cap: 20000

# Deterministic seeding
seed_base: 70000

# Fixed action during benchmark (0 = wait/no-op)
action_id: 0
